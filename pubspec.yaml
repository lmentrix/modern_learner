name: modern_learner_production
description: "Modern Learner — a professional Flutter BLoC application."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # ── UI ─────────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.4.1

  # ── State management ───────────────────────────────────────────────────────
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # ── Navigation ─────────────────────────────────────────────────────────────
  go_router: ^14.8.1

  # ── Dependency injection ────────────────────────────────────────────────────
  get_it: ^8.0.3
  injectable: ^2.5.0

  # ── Networking ─────────────────────────────────────────────────────────────
  dio: ^5.8.0+1
  retrofit: ^4.4.1
  pretty_dio_logger: ^1.4.0

  # ── Storage ────────────────────────────────────────────────────────────────
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4

  # ── Serialization ──────────────────────────────────────────────────────────
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4

  # ── Functional programming ─────────────────────────────────────────────────
  dartz: ^0.10.1

  # ── Connectivity ───────────────────────────────────────────────────────────
  connectivity_plus: ^6.1.4
  internet_connection_checker_plus: ^2.5.1

  # ── Logging ────────────────────────────────────────────────────────────────
  logger: ^2.5.0

  # ── Backend ────────────────────────────────────────────────────────────────
  supabase_flutter: ^2.8.4

  # ── Environment ────────────────────────────────────────────────────────────
  flutter_dotenv: ^5.2.1
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Linting ────────────────────────────────────────────────────────────────
  flutter_lints: ^6.0.0

  # ── Code generation ────────────────────────────────────────────────────────
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  freezed: ^2.5.7
  injectable_generator: ^2.7.0
  retrofit_generator: ^9.1.6

  # ── Testing ────────────────────────────────────────────────────────────────
  # bloc_test and mocktail have an analyzer conflict with freezed on Flutter
  # 3.41.6 (just released). Re-enable once packages catch up.
  # bloc_test: ^9.1.7
  # mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - .env
